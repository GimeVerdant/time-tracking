<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link href="./styles.css" rel="stylesheet" />
    <script type="module" defer src="./main.js"></script>
  </head>

  <body>
    <main class="container">
      <header class="page__header">
        <section class="profile">
          <div class="profile__card">
            <img
              src="./images/image-jeremy.png"
              alt="Jeremy Robson's profile picture"
              class="profile__picture"
            />
            <div class="profile__info">
              <p class="profile__report">Report for</p>
              <h1 class="profile__name">Jeremy Robson</h1>
            </div>
          </div>
        </section>

        <nav class="profile__nav" aria-label="Time period">
          <ul class="profile__list" role="tablist">
            <li
              id="tab-daily"
              class="profile__item"
              role="tab"
              tabindex="-1"
              aria-selected="false"
              aria-controls="report-panel"
            >
              Daily
            </li>
            <li
              id="tab-weekly"
              class="profile__item profile__item--active"
              role="tab"
              tabindex="0"
              aria-selected="true"
              aria-controls="report-panel"
            >
              Weekly
            </li>
            <li
              id="tab-monthly"
              class="profile__item"
              role="tab"
              tabindex="-1"
              aria-selected="false"
              aria-controls="report-panel"
            >
              Monthly
            </li>
          </ul>
        </nav>
      </header>

      <section id="report-panel" class="report" role="tabpanel" tabindex="0" aria-labelledby="tab-weekly">
        <div class="report__card report__card--work">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Work</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">5hrs</p>
              <p class="report__previous">Previous - 7hrs</p>
            </div>
          </div>
        </div>

        <div class="report__card report__card--play">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Play</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 2hrs</p>
            </div>
          </div>
        </div>

        <div class="report__card report__card--study">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Study</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">0hrs</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </div>

        <div class="report__card report__card--exercise">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Exercise</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </div>

        <div class="report__card report__card--social">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Social</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 3hrs</p>
            </div>
          </div>
        </div>

        <div class="report__card report__card--self-care">
          <div class="report__card--content">
            <div class="report__header">
              <h2 class="report__title">Self Care</h2>
              <img
                src="./images/icon-ellipsis.svg"
                alt=""
                class="report__icon"
              />
            </div>
            <div class="report__body">
              <p class="report__current">0hrs</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
