<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link href="./styles.css" rel="stylesheet" />
    <script type="module" defer src="./main.js"></script>
  </head>

  <body>
    <main class="container">
      <header class="page__header">
        <section class="profile">
          <div class="profile__card">
            <img
              src="./images/image-jeremy.png"
              alt="Jeremy Robson's profile picture"
              class="profile__picture"
            />
            <div class="profile__info">
              <p class="profile__report">Report for</p>
              <h1 class="profile__name">Jeremy Robson</h1>
            </div>
          </div>
        </section>

        <nav class="profile__nav" aria-label="Time period">
          <ul class="profile__list" role="tablist">
            <li class="profile__item">
              <button
                class="profile__tab"
                role="tab"
                aria-selected="false"
                tabindex="-1"
                id="tab-daily"
              >
                Daily
              </button>
            </li>
            <li class="profile__item profile__item--active">
              <button
                class="profile__tab"
                role="tab"
                tabindex="0"
                id="tab-weekly"
              >
                Weekly
              </button>
            </li>
            <li class="profile__item">
              <button
                class="profile__tab"
                id="tab-monthly"
                role="tab"
                tabindex="-1"
                aria-selected="false"
                aria-controls="report-panel"
              >
                Monthly
              </button>
            </li>
          </ul>
        </nav>
      </header>

      <section
        id="report-panel"
        class="report"
        role="tabpanel"
        tabindex="0"
        aria-labelledby="tab-weekly"
      >
        <article class="report__card report__card--work">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Work</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">5hrs</p>
              <p class="report__previous">Previous - 7hrs</p>
            </div>
          </div>
        </article>

        <article class="report__card report__card--play">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Play</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 2hrs</p>
            </div>
          </div>
        </article>

        <article class="report__card report__card--study">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Study</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">0hrs</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </article>

        <article class="report__card report__card--exercise">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Exercise</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </article>

        <article class="report__card report__card--social">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Social</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">1hr</p>
              <p class="report__previous">Previous - 3hrs</p>
            </div>
          </div>
        </article>

        <article class="report__card report__card--self-care">
          <div class="report__card--content">
            <header class="report__header">
              <h3 class="report__title">Self Care</h3>
              <img src="./images/icon-ellipsis.svg" alt="" class="report__icon" />
            </header>
            <div class="report__body">
              <p class="report__current">0hrs</p>
              <p class="report__previous">Previous - 1hr</p>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
